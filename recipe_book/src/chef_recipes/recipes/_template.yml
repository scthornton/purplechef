# SEC598 Chef — Recipe Template
# Copy this file to a new directory and customize it.
# Run `chef recipe lint <path>` to validate before submitting.

name: your-recipe-name                  # Lowercase, hyphenated, unique
version: "1.0"
description: >
  One-paragraph description of what this recipe emulates and validates.
  Include the MITRE technique name and why it matters.

metadata:
  author: your-github-handle
  mitre_techniques:                     # One or more ATT&CK technique IDs
    - T1234.001
  mitre_tactics:                        # Corresponding tactic(s)
    - credential-access                 # Must match ATT&CK taxonomy
  difficulty: beginner                  # beginner | intermediate | advanced
  estimated_time: 15m                   # How long the full cycle takes
  tags:                                 # Searchable tags
    - windows                           # Platform
    - credential-access                 # Tactic
    - purple-team                       # Always include this

mise_en_place:
  terraform_module: windows-target      # Reference to infrastructure/terraform/modules/
  ansible_roles:                        # Roles to apply to targets
    - limacharlie-sensor
    - atomic-install
  prerequisites:                        # Checks before execution
    caldera_server_running: true
    limacharlie_org_configured: true

attack:
  method: caldera                       # caldera | atomic | manual
  caldera:                              # Required if method: caldera
    adversary_name: chef-your-recipe
    abilities:
      - technique_id: T1234.001
        ability_id: auto                # "auto" = resolve via MITRE resolver
        description: What this step does
    group: chef-targets                 # Caldera agent group to target
    timeout: 300                        # Seconds to wait for completion
  # atomic:                             # Required if method: atomic
  #   technique_id: T1234.001
  #   test_numbers: [1]                 # Atomic Red Team test numbers

validate:
  detection_source: limacharlie         # limacharlie | sentinel | manual
  wait_seconds: 120                     # Telemetry propagation delay
  expected_rules:                       # Rules we expect to fire
    - name: Your Detection Rule Name
      tags: ["t1234"]
  sigma_rules:                          # Sigma rules to validate against
    - path: sigma-rules/your-rule.yml

report:
  format: [json, html]                  # json | html | navigator
  evidence_required: true

advise:
  generate_sigma: true                  # Draft a Sigma rule if technique missed
  generate_kql: false                   # Future: KQL for Azure Sentinel
